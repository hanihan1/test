<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menunggu Verifikasi – EcoEats</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/waiting.css"> 
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="index.html" class="logo">
    <span class="logo-text">EcoEats</span>
</a>
  <div class="topbar-right" id="topbar-info" style="font-size:13px; color:black">
    Butuh bantuan? <a href="mailto:support@ecoeats.id" style="color:#5F6F52;font-weight:600;text-decoration:none">support@ecoeats.id</a>
  </div>
</header>

<!-- MAIN -->
<main class="main">
  <div class="container">

    <!-- ══ HERO CARD ══ -->
    <div class="hero-card">
      <div class="hero-banner">
        <h1 id="hero-title">Pendaftaran Berhasil!</h1>
        <p id="hero-subtitle">Dokumen kamu sedang masuk dalam tahap pengecekan, mohon tunggu ya!</p>
      </div>
    </div>

    <!-- ══ STATUS CARD ══ -->
    <div class="info-card" id="status-card">
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <span style="font-weight: 600; font-size: 14px; color: var(--text-soft);">Status Pendaftaran</span>
        <div id="status-badge" class="status-pill" 
             style="background: var(--warning-pale); color: var(--warning); border: 1px solid rgba(230,126,34,0.2); display: flex; align-items: center; padding: 4px 12px; border-radius: 20px;">
          <span id="status-dot" style="display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px;"></span>
          <span id="status-badge-text">Pending</span>
        </div>
      </div>
    </div>

    <!-- ══ SUBMITTED DATA ══ -->
    <div class="info-card">
      <div class="info-card-title">Ringkasan Pendaftaran</div>
      <div id="submitted-data">
        <div class="data-row"><span class="data-key">Nama</span>       <span class="data-val" id="d-nama">—</span></div>
        <div class="data-row"><span class="data-key">Email</span>      <span class="data-val" id="d-email">—</span></div>
        <div class="data-row"><span class="data-key">No. HP</span>     <span class="data-val" id="d-hp">—</span></div>
        <div class="data-row"><span class="data-key">Nama Usaha</span>  <span class="data-val" id="d-toko">—</span></div>
        <div class="data-row"><span class="data-key">Kategori</span>   <span class="data-val" id="d-kategori">—</span></div>
        <div class="data-row"><span class="data-key">Alamat</span>     <span class="data-val" id="d-alamat">—</span></div>
        <div class="data-row"><span class="data-key">Waktu Daftar</span><span class="data-val" id="d-waktu">—</span></div>
      </div>
    </div>

  </div>
</main>

<script src="js/waiting.js"></script>
</body>
</html>
