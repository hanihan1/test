<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoEats — Masuk ke Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div id="page-auth">

  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-word" style="color:#5F6F52; font-size:36px; text-shadow:0 2px 12px rgba(0,0,0,.35);">EcoEats</div>
    <div class="logo-tag">Makan Murah Penting Kenyang</div>
  </div>

  <!-- Auth form card -->
  <div class="auth-card" id="auth-card">

    <!-- Merchant login form -->
    <div id="auth-merchant">
      <span class="role-pill">Portal Mitra Merchant</span>
      <h1>Portal Merchant</h1>
      <br>
      <form class="auth-form" onsubmit="handleMerchantLogin(event)">
        <label for="merchant-email">Email</label>
        <input type="email" id="merchant-email" placeholder="username@gmail.com" required>
        <label for="merchant-pass">Password</label>
        <input type="password" id="merchant-pass" placeholder="••••••••" required>
        <div class="check-wrap">
          <input type="checkbox" id="rem">
          <label for="rem">Ingat saya</label>
        </div>
        <button type="submit" class="auth-btn">Masuk</button>
      </form>
      <div class="info-box">
        <strong>Belum terdaftar sebagai mitra?</strong>
        <br>
        <a href="register-merchant.html" style="color:inherit; font-weight:700; text-decoration:underline;">
          → Daftar sebagai Merchant
        </a>
      </div>
    </div>

    <!-- Admin login form -->
    <div id="auth-admin" class="hide">
      <span class="role-pill">Portal Admin</span>
      <h1>Portal Admin</h1>
      <br>
      <form class="auth-form" onsubmit="handleAdminLogin(event)">
        <label for="admin-email">Email</label>
        <input type="email" id="admin-email" placeholder="admin@ecoeats.id" required>
        <label for="admin-pass">Password</label>
        <input type="password" id="admin-pass" placeholder="••••••••" required>
        <div class="check-wrap">
          <input type="checkbox" id="rem-admin">
          <label for="rem-admin">Ingat saya</label>
        </div>
        <button type="submit" class="auth-btn">Masuk</button>
      </form>
      <div class="info-box">
        <strong>Akses terbatas</strong>
        Hanya akun administrator resmi yang dapat mengakses page ini.
      </div>
    </div>
  </div>

  <!-- Role switcher -->
  <div class="role-switch">
    <span>Login sebagai:</span>
    <div class="pills-wrap">
      <button class="pill active" onclick="switchRole('merchant', this)">Merchant</button>
      <button class="pill"        onclick="switchRole('admin', this)">Admin</button>
    </div>
  </div>

</div>

<script>
  function switchRole(role, btn) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('auth-merchant').classList.toggle('hide', role !== 'merchant');
    document.getElementById('auth-admin').classList.toggle('hide',    role !== 'admin');
    const card = document.getElementById('auth-card');
    card.style.transform = 'scale(.985)';
    setTimeout(() => { card.style.transform = 'scale(1)'; }, 150);
  }

  function handleMerchantLogin(event) {
    event.preventDefault();
    localStorage.setItem('userRole', 'merchant');
    window.location.href = 'dashboard.html';
  }

  function handleAdminLogin(event) {
    event.preventDefault();
    localStorage.setItem('userRole', 'admin');
    window.location.href = 'dashboard.html';
  }
</script>

</body>
</html>
